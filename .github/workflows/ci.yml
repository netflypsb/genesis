name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Run analyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path setup -Recurse -Severity Error,Warning
          $results | Format-Table
          if ($results | Where-Object Severity -eq 'Error') { exit 1 }

  json-validate:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all *.json
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path '*/node_modules/*' -not -path '*/vendor/*'); do
            echo "Validating $f"
            python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done

  catalog-validate:
    name: Validate catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq
      - name: Structural + source-path check
        run: bash scripts/validate-catalog.sh
      - name: Catalog reader smoke test
        run: bash scripts/test-catalog-reader.sh

  provision-syntax:
    name: provision.sh shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n
        run: bash -n provision.sh
      - name: shellcheck (warnings allowed)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -S error provision.sh scripts/*.sh || true
